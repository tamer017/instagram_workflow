name: Publish thumbnail IMAGE via Facebook Graph (ngrok v3, secrets)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq unzip curl ffmpeg

      - name: Download & install ngrok v3 binary
        env:
          NGROK_DOWNLOAD_URL: "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz"
        run: |
          set -euo pipefail
          echo "Downloading ngrok v3 from $NGROK_DOWNLOAD_URL"
          curl -fsSL "$NGROK_DOWNLOAD_URL" -o /tmp/ngrok.tgz
          sudo tar -xzf /tmp/ngrok.tgz -C /usr/local/bin || sudo tar -xzf /tmp/ngrok.tgz -C /tmp
          if [ -x /usr/local/bin/ngrok ]; then NGROK_BIN=/usr/local/bin/ngrok; else NGROK_BIN=/tmp/ngrok; fi
          echo "$NGROK_BIN" > /tmp/ngrok_bin.txt
          $NGROK_BIN version || true

      - name: Generate video + thumbnails (fast)
        run: |
          mkdir -p tmp_video outputs
          . .venv/bin/activate
          python generate_video_ffmpeg.py tmp_video 2 24 3
          ls -l tmp_video

      - name: Start local HTTP server
        run: |
          python -m http.server 8000 --directory tmp_video >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 1

      - name: Start ngrok v3 (required)
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          set -euo pipefail
          NGROK_BIN=$(cat /tmp/ngrok_bin.txt)
          if [ -z "${NGROK_AUTHTOKEN:-}" ]; then
            echo "NGROK_AUTHTOKEN not set. Aborting."
            exit 1
          fi
          echo "Configuring ngrok authtoken and starting tunnel via $NGROK_BIN"
          $NGROK_BIN authtoken "$NGROK_AUTHTOKEN" || true
          $NGROK_BIN http 8000 --log=stdout > /tmp/ngrok.log 2>&1 &
          echo $! > /tmp/ngrok.pid
          for i in {1..20}; do
            sleep 1
            if curl -s http://127.0.0.1:4040/api/tunnels >/tmp/tunnels.json 2>/dev/null; then
              PUB=$(jq -r '.tunnels[0].public_url' /tmp/tunnels.json 2>/dev/null || true)
              if [ -n "$PUB" ] && [ "$PUB" != "null" ]; then
                echo "$PUB" > /tmp/public_url.txt
                echo "Public URL: $PUB"
                break
              fi
            fi
          done
          if [ ! -f /tmp/public_url.txt ]; then
            echo "Failed to get ngrok public URL. Dumping log:"
            tail -n +1 /tmp/ngrok.log
            exit 1
          fi

      - name: Verify thumbnail URL and publish as IMAGE (reads secrets)
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          LONG_LIVED_TOKEN: ${{ secrets.LONG_LIVED_TOKEN }}
        run: |
          PUB=$(cat /tmp/public_url.txt)
          PUB=$(echo "$PUB" | tr -d '\r\n')
          THUMB_URL="${PUB}/thumb_1.jpg"
          echo "Checking THUMB_URL=$THUMB_URL"
          if ! curl -I --max-time 10 "$THUMB_URL" | head -n1 | grep -q 'HTTP/'; then
            echo "Thumb URL not reachable or timed out. Dumping logs:"
            tail -n 200 /tmp/http.log || true
            cat /tmp/ngrok.log || true
            exit 1
          fi
          . .venv/bin/activate
          python publish_image_secrets.py "$THUMB_URL" "Automated image post from workflow"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-media
          path: tmp_video/video_and_thumbs.zip

      - name: Teardown always
        if: always()
        run: |
          if [ -f /tmp/ngrok.pid ]; then kill $(cat /tmp/ngrok.pid) || true; fi
          if [ -f /tmp/http.pid ]; then kill $(cat /tmp/http.pid) || true; fi
          sleep 1
          echo "Teardown complete."
